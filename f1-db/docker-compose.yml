services:
  postgres-db:
    image: postgres:18.3-alpine3.23
    container_name: f1_postgres
    environment:
      POSTGRES_USER: f1_user
      POSTGRES_PASSWORD: f1_password
      POSTGRES_DB: f1_database
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./jolpica-f1-csv:/jolpica-f1-csv
      - ./init_scripts:/docker-entrypoint-initdb.d
    networks:
      - f1_network

  pgadmin:
    image: dpage/pgadmin4:9.13
    container_name: f1_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@f1.local
      PGADMIN_DEFAULT_PASSWORD: admin_password
      PGADMIN_CONFIG_ALLOW_SPECIAL_EMAIL_DOMAINS: '"local"'
    ports:
      - "5050:80"
    depends_on:
      - postgres-db
    networks:
      - f1_network

volumes:
  pg_data:

networks:
  f1_network:
    driver: bridge
